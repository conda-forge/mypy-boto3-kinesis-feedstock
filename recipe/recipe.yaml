schema_version: 1

context:
  name: mypy-boto3-kinesis
  version: 1.42.41

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/mypy_boto3_kinesis-${{ version }}.tar.gz
  sha256: df15a9d4383a642dedd1d50da83fa260968a03137920bbfc4aad502f1ec85efa

build:
  number: 0
  noarch: python
  script:
    env:
      PYTHONUTF8: 1
    content: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - botocore
    - python >=${{ python_min }}
    - typing_extensions
tests:
  - python:
      imports:
        - mypy_boto3_kinesis
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Type annotations for boto3 Kinesis ${{ version }} service generated with mypy-boto3-builder
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/youtype/mypy_boto3_builder
  repository: https://github.com/youtype/mypy_boto3_builder

extra:
  recipe-maintainers:
    - StevenSchaererQC
    - janjagusch
